services:
  - type: web
    name: physioflexstudio
    runtime: static
    plan: free
    # npm only — commit package-lock.json; omit bun.lock so Render does not use Bun.
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
